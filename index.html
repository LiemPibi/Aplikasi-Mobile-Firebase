<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Kontak Firebase (Auth + Realtime DB)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10">
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body p-4 p-md-5">
            <h1 class="mb-1">Manajemen Kontak Firebase</h1>
            <p class="text-secondary mb-4">Autentikasi pengguna + CRUD Realtime Database.</p>

            <div class="row g-4">
              <div class="col-12 col-md-6">
                <h2 class="h5">Register</h2>
                <form id="registerForm" class="row g-2">
                  <div class="col-12">
                    <label for="registerEmail" class="form-label">Email</label>
                    <input type="email" id="registerEmail" class="form-control" required />
                  </div>
                  <div class="col-12">
                    <label for="registerPassword" class="form-label">Password</label>
                    <input type="password" id="registerPassword" class="form-control" minlength="6" required />
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-primary w-100">Daftar</button>
                  </div>
                </form>
              </div>

              <div class="col-12 col-md-6">
                <h2 class="h5">Login</h2>
                <form id="loginForm" class="row g-2">
                  <div class="col-12">
                    <label for="loginEmail" class="form-label">Email</label>
                    <input type="email" id="loginEmail" class="form-control" required />
                  </div>
                  <div class="col-12">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-control" required />
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-success w-100">Masuk</button>
                  </div>
                </form>
              </div>
            </div>

            <div class="d-flex flex-column flex-md-row gap-2 justify-content-between align-items-md-center mt-4">
              <p id="authStatus" class="mb-0 text-secondary">Belum login.</p>
              <button id="logoutBtn" class="btn btn-outline-danger btn-sm" disabled>Logout</button>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <h2 class="h4 mb-1">Form Kontak</h2>
            <p class="text-secondary mb-4">Login terlebih dahulu untuk mengelola data kontak.</p>

            <form id="contactForm" class="row g-3" aria-disabled="true">
              <input type="hidden" id="contactId" />

              <div class="col-md-6">
                <label for="name" class="form-label">Nama</label>
                <input type="text" class="form-control" id="name" required disabled />
              </div>

              <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required disabled />
              </div>

              <div class="col-md-6">
                <label for="phone" class="form-label">No. HP</label>
                <input type="tel" class="form-control" id="phone" required disabled />
              </div>

              <div class="col-md-6">
                <label for="city" class="form-label">Kota</label>
                <input type="text" class="form-control" id="city" required disabled />
              </div>

              <div class="col-12">
                <label for="note" class="form-label">Catatan</label>
                <textarea class="form-control" id="note" rows="2" required disabled></textarea>
              </div>

              <div class="col-12 d-flex gap-2">
                <button type="submit" id="submitBtn" class="btn btn-primary" disabled>Simpan Data</button>
                <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary d-none" disabled>Batal Edit</button>
              </div>
            </form>
          </div>
        </div>

        <div class="card shadow-sm border-0 mt-4">
          <div class="card-body p-4 p-md-5">
            <h2 class="h4 mb-3">Daftar Kontak</h2>
            <div class="table-responsive">
              <table class="table align-middle" id="contactTable">
                <thead>
                  <tr>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>No. HP</th>
                    <th>Kota</th>
                    <th>Catatan</th>
                    <th class="text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody id="contactTableBody">
                  <tr>
                    <td colspan="6" class="text-center text-secondary">Silakan login untuk melihat data.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
